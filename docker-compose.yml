services:
  postgres:
    image: postgres:16-alpine
    container_name: review-ratings-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-reviewuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reviewpass}
      POSTGRES_DB: ${POSTGRES_DB:-reviewdb}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reviewuser} -d ${POSTGRES_DB:-reviewdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: review-ratings-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: review-ratings-search
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-dev-master-key}
      MEILI_ENV: development
    ports:
      - "${MEILISEARCH_PORT:-7700}:7700"
    volumes:
      - meilidata:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
  meilidata:
