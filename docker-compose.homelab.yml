services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reviewdb}
      POSTGRES_USER: ${POSTGRES_USER:-reviewuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reviewpass2026}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reviewuser}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app

  meilisearch:
    image: getmeili/meilisearch:v1.12
    restart: always
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_MASTER_KEY}
      MEILI_ENV: production
    volumes:
      - meilidata:/meili_data
    networks:
      - app

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: always
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"
    networks:
      - app
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://api:3001
    restart: always
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://api:3001
      PORT: "3000"
    depends_on:
      - api
    ports:
      - "3000:3000"
    networks:
      - app

volumes:
  pgdata:
  redisdata:
  meilidata:

networks:
  app:
    driver: bridge
